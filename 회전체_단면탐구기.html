<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>회전체 단면 탐구기 · 트이다 수학학원</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --navy:#1B2A4A; --navy-soft:#3a4a6a; --orange:#E8650A; --gold:#F2B544;
    --paper:#f4f2ee; --paper-2:#ece9e2; --ink:#2a3142; --muted:#8B97AC;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:'IBM Plex Sans KR',sans-serif;background:var(--paper);color:var(--ink);}
  #scene{position:fixed;inset:0;touch-action:none;cursor:grab;}
  #scene:active{cursor:grabbing;}

  .topbar{position:fixed;top:0;left:0;right:0;height:54px;display:flex;align-items:center;
    gap:12px;padding:0 18px;z-index:20;pointer-events:none;
    background:linear-gradient(180deg, rgba(244,242,238,.95), rgba(244,242,238,0));}
  .brand{display:flex;align-items:center;gap:9px;pointer-events:auto;}
  .brand .mark{width:26px;height:26px;border-radius:7px;background:var(--navy);
    display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:700;font-size:15px;}
  .brand .name{font-weight:600;font-size:14px;color:var(--navy);letter-spacing:-.2px;}
  .brand .name b{color:var(--orange);}
  .topbar .title{font-size:13px;color:var(--muted);font-weight:500;
    border-left:1px solid var(--paper-2);padding-left:12px;}

  .panel{position:fixed;top:64px;right:14px;width:248px;z-index:15;
    background:rgba(255,255,255,.82);backdrop-filter:blur(10px);
    border:1px solid rgba(27,42,74,.08);border-radius:16px;padding:14px;
    box-shadow:0 8px 30px rgba(27,42,74,.10);}
  .grp{margin-bottom:14px;} .grp:last-child{margin-bottom:0;}
  .lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;
    letter-spacing:.6px;margin-bottom:7px;}
  .row{display:flex;gap:6px;flex-wrap:wrap;}
  .btn{flex:1;min-width:52px;border:1px solid rgba(27,42,74,.12);background:#fff;
    color:var(--navy);border-radius:10px;padding:9px 6px;font-family:inherit;
    font-size:12.5px;font-weight:500;cursor:pointer;transition:.15s;text-align:center;}
  .btn:hover{border-color:var(--orange);color:var(--orange);}
  .btn:active{transform:scale(.97);}
  .btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .slider{margin-bottom:11px;}
  .slider .sl-top{display:flex;justify-content:space-between;font-size:12px;
    color:var(--navy);font-weight:500;margin-bottom:5px;}
  .slider .sl-top span:last-child{font-family:'IBM Plex Mono',monospace;color:var(--orange);}
  input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:4px;
    background:var(--paper-2);outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;
    border-radius:50%;background:var(--orange);cursor:pointer;border:2px solid #fff;
    box-shadow:0 1px 4px rgba(0,0,0,.25);}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;
    background:var(--orange);cursor:pointer;border:2px solid #fff;}
  .toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;
    border:1px solid rgba(27,42,74,.12);border-radius:10px;cursor:pointer;font-size:12.5px;
    font-weight:500;color:var(--navy);user-select:none;transition:.15s;}
  .toggle:hover{border-color:var(--orange);}
  .toggle .sw{width:34px;height:20px;border-radius:20px;background:var(--paper-2);
    position:relative;transition:.2s;flex-shrink:0;}
  .toggle .sw::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;
    border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .toggle.on .sw{background:var(--orange);} .toggle.on .sw::after{left:16px;}

  .result{position:fixed;left:14px;bottom:14px;z-index:15;background:rgba(255,255,255,.82);
    backdrop-filter:blur(10px);border:1px solid rgba(27,42,74,.08);border-radius:16px;
    padding:13px 16px;box-shadow:0 8px 30px rgba(27,42,74,.10);min-width:172px;}
  .result .cap{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px;margin-bottom:3px;}
  .result .shape{font-size:22px;font-weight:700;color:var(--navy);letter-spacing:-.5px;}
  .result .shape.empty{font-size:14px;font-weight:500;color:var(--muted);}
  .result .sub{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--orange);margin-top:3px;}

  .inset{position:fixed;right:14px;bottom:14px;z-index:15;background:rgba(255,255,255,.82);
    backdrop-filter:blur(10px);border:1px solid rgba(27,42,74,.08);border-radius:16px;
    padding:10px;box-shadow:0 8px 30px rgba(27,42,74,.10);}
  .inset .cap{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px;
    margin-bottom:6px;text-align:center;}
  #flat{display:block;border-radius:8px;background:var(--paper);}

  .hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:14;
    font-size:11.5px;color:var(--muted);font-weight:500;background:rgba(255,255,255,.7);
    padding:7px 14px;border-radius:20px;backdrop-filter:blur(6px);white-space:nowrap;}
  .hint b{color:var(--navy);font-weight:600;}

  @media (max-width:740px){
    .panel{top:auto;bottom:14px;right:50%;transform:translateX(50%);
      width:calc(100% - 28px);max-width:380px;}
    .result{left:14px;bottom:calc(14px + 318px);min-width:0;}
    .inset{right:14px;bottom:calc(14px + 318px);}
    .hint{display:none;}
  }
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div class="topbar">
  <div class="brand">
    <div class="mark">트</div>
    <div class="name">트이다 <b>수학학원</b></div>
  </div>
  <div class="title">회전체 단면 탐구기</div>
</div>

<div class="panel">
  <div class="grp">
    <div class="lbl">회전체</div>
    <div class="row" id="solids">
      <button class="btn active" data-solid="cylinder">원기둥</button>
      <button class="btn" data-solid="cone">원뿔</button>
      <button class="btn" data-solid="sphere">구</button>
      <button class="btn" data-solid="frustum">원뿔대</button>
    </div>
  </div>
  <div class="grp">
    <div class="lbl">자르는 방향</div>
    <div class="row" id="modes">
      <button class="btn active" data-mode="perp">축에 수직</button>
      <button class="btn" data-mode="contain">축을 포함</button>
      <button class="btn" data-mode="oblique">비스듬히</button>
    </div>
  </div>
  <div class="grp">
    <div class="lbl">평면 조절</div>
    <div class="slider">
      <div class="sl-top"><span>기울기</span><span id="v-tilt">0°</span></div>
      <input type="range" id="s-tilt" min="0" max="90" value="0">
    </div>
    <div class="slider">
      <div class="sl-top"><span>높이</span><span id="v-pos">0.0</span></div>
      <input type="range" id="s-pos" min="-95" max="95" value="0">
    </div>
    <div class="toggle on" id="t-plane"><span>자르는 면 보기</span><span class="sw"></span></div>
  </div>
</div>

<div class="result">
  <div class="cap">단면 모양</div>
  <div class="shape" id="shape">원</div>
  <div class="sub" id="sub">축에 수직</div>
</div>

<div class="inset">
  <div class="cap">실제 단면</div>
  <canvas id="flat" width="168" height="168"></canvas>
</div>

<div class="hint"><b>드래그</b> 회전 · <b>휠/핀치</b> 확대 · 슬라이더로 평면 조절</div>

<script>
(function(){
  const V = THREE.Vector3;

  // ---- 상태 ----
  let solidKey='cylinder', tilt=0, pos=0, showPlane=true;
  let tris=[];           // 현재 도형의 삼각형 목록 (슬라이싱용)

  // ---- Three.js ----
  const canvas=document.getElementById('scene');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(42,1,0.1,100);
  scene.add(new THREE.AmbientLight(0xffffff,0.88));
  const dl=new THREE.DirectionalLight(0xffffff,0.42); dl.position.set(4,6,5); scene.add(dl);

  const world=new THREE.Group(); scene.add(world);
  const solidGroup=new THREE.Group(); world.add(solidGroup);
  const sectionGroup=new THREE.Group(); world.add(sectionGroup);

  // 회전축 (점선)
  const axisLine=new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new V(0,-1.4,0),new V(0,1.4,0)]),
    new THREE.LineDashedMaterial({color:0x1B2A4A,dashSize:0.09,gapSize:0.07,transparent:true,opacity:0.55})
  );
  axisLine.computeLineDistances(); world.add(axisLine);

  // 자르는 면 (반투명 원판)
  const planeDisk=new THREE.Mesh(
    new THREE.CircleGeometry(1.75,56),
    new THREE.MeshBasicMaterial({color:0xF2B544,transparent:true,opacity:0.16,
      side:THREE.DoubleSide,depthWrite:false})
  );
  world.add(planeDisk);

  // ---- 도형 생성 (THREE 지오메트리에서 삼각형 추출 → 표시도 동일 메쉬 사용) ----
  function trianglesFromGeo(geo){
    const g=geo.index?geo.toNonIndexed():geo;
    const p=g.attributes.position.array, out=[];
    for(let i=0;i<p.length;i+=9){
      out.push([new V(p[i],p[i+1],p[i+2]),new V(p[i+3],p[i+4],p[i+5]),new V(p[i+6],p[i+7],p[i+8])]);
    }
    return out;
  }
  function makeRing(r,y){
    const pts=[]; for(let i=0;i<=64;i++){const a=i/64*Math.PI*2;pts.push(new V(r*Math.cos(a),y,r*Math.sin(a)));}
    return new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({color:0x1B2A4A,transparent:true,opacity:0.85}));
  }
  function makeMeridian(){ // 구용 세로 원
    const pts=[]; for(let i=0;i<=64;i++){const a=i/64*Math.PI*2;pts.push(new V(Math.cos(a),Math.sin(a),0));}
    return new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({color:0x1B2A4A,transparent:true,opacity:0.35}));
  }

  function buildSolid(key){
    while(solidGroup.children.length){
      const c=solidGroup.children.pop();
      if(c.geometry)c.geometry.dispose(); if(c.material)c.material.dispose();
    }
    let geo, rings=[];
    if(key==='cylinder'){ geo=new THREE.CylinderGeometry(1,1,2,56); rings=[makeRing(1,1),makeRing(1,-1)]; }
    else if(key==='cone'){ geo=new THREE.ConeGeometry(1,2,56); rings=[makeRing(1,-1)]; }
    else if(key==='frustum'){ geo=new THREE.CylinderGeometry(0.5,1,2,56); rings=[makeRing(0.5,1),makeRing(1,-1)]; }
    else { geo=new THREE.SphereGeometry(1,56,40); rings=[makeRing(1,0),makeMeridian()]; }

    const surf=new THREE.Mesh(geo,new THREE.MeshPhongMaterial({
      color:0x3a4a6a,transparent:true,opacity:0.16,side:THREE.DoubleSide,
      depthWrite:false,shininess:4}));
    solidGroup.add(surf);
    rings.forEach(r=>solidGroup.add(r));
    tris=trianglesFromGeo(geo);
  }

  // ---- 평면 정의 ----
  function planeFromState(){
    const a=tilt*Math.PI/180;
    const normal=new V(Math.sin(a),Math.cos(a),0).normalize();
    const point=new V(0,pos,0);
    return {point,normal};
  }

  // ---- 평면 ∩ 도형 → 단면 다각형 ----
  function getSection(){
    const {point,normal}=planeFromState();
    const sd=p=>p.clone().sub(point).dot(normal);
    const eps=1e-5, raw=[];
    for(const t of tris){
      for(let e=0;e<3;e++){
        const A=t[e], B=t[(e+1)%3], dA=sd(A), dB=sd(B);
        if((dA<-eps&&dB>eps)||(dA>eps&&dB<-eps)){
          raw.push(A.clone().lerp(B,dA/(dA-dB)));
        }
      }
    }
    const pts=[];
    raw.forEach(p=>{if(!pts.some(q=>q.distanceTo(p)<2e-3))pts.push(p);});
    if(pts.length<3) return null;
    const c=new V(); pts.forEach(p=>c.add(p)); c.multiplyScalar(1/pts.length);
    let u=pts[0].clone().sub(c); if(u.length()<1e-6)u=pts[1].clone().sub(c); u.normalize();
    const vv=normal.clone().cross(u).normalize();
    pts.sort((p,q)=>Math.atan2(p.clone().sub(c).dot(vv),p.clone().sub(c).dot(u))
                   -Math.atan2(q.clone().sub(c).dot(vv),q.clone().sub(c).dot(u)));
    return {poly:pts,normal,u,v:vv,center:c,point};
  }

  // ---- 단면 이름 (도형+방향 기반) ----
  function shapeName(sec){
    if(!sec) return null;
    if(solidKey==='sphere'){
      const d=Math.abs(sec.point.clone().dot(sec.normal));
      return d<0.06?'원 (가장 큰 원)':'원';
    }
    if(tilt<12) return '원';
    if(tilt>78) return {cylinder:'직사각형',cone:'이등변삼각형',frustum:'사다리꼴'}[solidKey];
    const capY={cylinder:[1,-1],cone:[-1],frustum:[1,-1]}[solidKey]||[];
    const touched=sec.poly.some(p=>capY.some(cy=>Math.abs(p.y-cy)<0.03));
    return touched?'비스듬한 단면':'타원';
  }

  // ---- 단면 렌더 ----
  function clearSection(){
    while(sectionGroup.children.length){
      const c=sectionGroup.children.pop();
      if(c.geometry)c.geometry.dispose(); if(c.material)c.material.dispose();
    }
  }
  function renderSection(){
    clearSection();
    const sec=getSection();
    const shapeEl=document.getElementById('shape'), subEl=document.getElementById('sub');
    subEl.textContent = tilt<12?'축에 수직':tilt>78?'축을 포함':('비스듬히 · 기울기 '+Math.round(tilt)+'°');

    if(!sec){ shapeEl.className='shape empty'; shapeEl.textContent='단면 없음'; drawFlat(null); return; }

    const {poly,center:c}=sec;
    const verts=[];
    for(let i=0;i<poly.length;i++){
      const a=poly[i], b=poly[(i+1)%poly.length];
      verts.push(c.x,c.y,c.z, a.x,a.y,a.z, b.x,b.y,b.z);
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(verts,3)); g.computeVertexNormals();
    sectionGroup.add(new THREE.Mesh(g,new THREE.MeshBasicMaterial({
      color:0xE8650A,transparent:true,opacity:0.34,side:THREE.DoubleSide,depthWrite:false})));
    const loop=poly.map(p=>p.clone()); loop.push(poly[0].clone());
    sectionGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(loop),
      new THREE.LineBasicMaterial({color:0xE8650A})));

    shapeEl.className='shape'; shapeEl.textContent=shapeName(sec);
    drawFlat(sec);
  }

  // ---- 실제 단면 2D ----
  // 도형별 최대 단면 반경 (3D 단위 기준) — 이 값을 캔버스 폭의 기준으로 고정
  const SOLID_MAX_SPAN = {cylinder:2, cone:2, frustum:2, sphere:2};

  const flat=document.getElementById('flat'), fx=flat.getContext('2d');
  function drawFlat(sec){
    const W=flat.width, H=flat.height, pad=22;
    fx.clearRect(0,0,W,H); fx.fillStyle='#f4f2ee'; fx.fillRect(0,0,W,H);
    if(!sec) return;

    const p2=sec.poly.map(p=>{
      const d=p.clone().sub(sec.center);
      return {x:d.dot(sec.u), y:d.dot(sec.v)};
    });

    // 고정 스케일: 도형의 최대 지름(maxSpan)이 캔버스 전체를 채우는 비율
    const maxSpan = SOLID_MAX_SPAN[solidKey] || 2;
    const s = (Math.min(W,H) - pad*2) / maxSpan;

    // 단면 중심을 캔버스 중앙에 맞춤
    const cx2 = p2.reduce((a,p)=>a+p.x,0)/p2.length;
    const cy2 = p2.reduce((a,p)=>a+p.y,0)/p2.length;
    const ox = W/2 - cx2*s;
    const oy = H/2 + cy2*s;
    const px = p => ({x: ox+p.x*s, y: oy-p.y*s});

    // 단면 채우기
    fx.beginPath();
    p2.forEach((p,i)=>{const q=px(p); i?fx.lineTo(q.x,q.y):fx.moveTo(q.x,q.y);});
    fx.closePath();
    fx.fillStyle='rgba(232,101,10,.20)'; fx.fill();
    fx.strokeStyle='#E8650A'; fx.lineWidth=2.2; fx.stroke();

    // 참고용: 도형 최대 외곽선 (점선 원)
    fx.beginPath();
    fx.arc(W/2, H/2, (maxSpan/2)*s, 0, Math.PI*2);
    fx.strokeStyle='rgba(139,151,172,.25)'; fx.lineWidth=1.2;
    fx.setLineDash([4,4]); fx.stroke(); fx.setLineDash([]);
  }

  // ---- 자르는 면 원판 갱신 ----
  function updatePlaneDisk(){
    planeDisk.visible=showPlane;
    if(!showPlane) return;
    const {point,normal}=planeFromState();
    planeDisk.position.copy(point);
    planeDisk.quaternion.setFromUnitVectors(new V(0,0,1),normal);
  }

  // ---- 전체 갱신 ----
  function update(){ updatePlaneDisk(); renderSection(); }

  // ---- 컨트롤 ----
  document.getElementById('solids').addEventListener('click',e=>{
    const b=e.target.closest('[data-solid]'); if(!b)return;
    document.querySelectorAll('#solids .btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); solidKey=b.dataset.solid; buildSolid(solidKey); update();
  });
  function setMode(mode){
    if(mode==='perp'){tilt=0;} else if(mode==='contain'){tilt=90;} else {tilt=42;}
    document.getElementById('s-tilt').value=tilt;
    document.getElementById('v-tilt').textContent=Math.round(tilt)+'°';
    syncModeButtons(); update();
  }
  function syncModeButtons(){
    const m=tilt<12?'perp':tilt>78?'contain':'oblique';
    document.querySelectorAll('#modes .btn').forEach(x=>x.classList.toggle('active',x.dataset.mode===m));
  }
  document.getElementById('modes').addEventListener('click',e=>{
    const b=e.target.closest('[data-mode]'); if(!b)return; setMode(b.dataset.mode);
  });
  document.getElementById('s-tilt').addEventListener('input',e=>{
    tilt=+e.target.value; document.getElementById('v-tilt').textContent=Math.round(tilt)+'°';
    syncModeButtons(); update();
  });
  document.getElementById('s-pos').addEventListener('input',e=>{
    pos=(+e.target.value)/100; document.getElementById('v-pos').textContent=pos.toFixed(1);
    update();
  });
  const tp=document.getElementById('t-plane');
  tp.addEventListener('click',()=>{tp.classList.toggle('on');showPlane=tp.classList.contains('on');updatePlaneDisk();});

  // ---- 회전/확대 ----
  let theta=0.7, phi=1.12, radius=5.0;
  const ptrs=new Map(); let lastX=0,lastY=0,pinch=0;
  function updateCamera(){
    camera.position.set(radius*Math.sin(phi)*Math.sin(theta),radius*Math.cos(phi),radius*Math.sin(phi)*Math.cos(theta));
    camera.lookAt(0,0,0);
  }
  canvas.addEventListener('pointerdown',e=>{
    canvas.setPointerCapture(e.pointerId); ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(ptrs.size===1){lastX=e.clientX;lastY=e.clientY;}
    else if(ptrs.size===2){const p=[...ptrs.values()];pinch=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);}
  });
  canvas.addEventListener('pointermove',e=>{
    if(!ptrs.has(e.pointerId))return; ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(ptrs.size===2){const p=[...ptrs.values()];const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
      if(pinch){radius*=pinch/d;radius=Math.max(2.8,Math.min(11,radius));updateCamera();}pinch=d;return;}
    const dx=e.clientX-lastX,dy=e.clientY-lastY; lastX=e.clientX;lastY=e.clientY;
    theta-=dx*0.008; phi-=dy*0.008; phi=Math.max(0.12,Math.min(Math.PI-0.12,phi)); updateCamera();
  });
  function endP(e){ptrs.delete(e.pointerId); if(ptrs.size<2)pinch=0;}
  canvas.addEventListener('pointerup',endP);
  canvas.addEventListener('pointercancel',endP);
  canvas.addEventListener('wheel',e=>{e.preventDefault();
    radius*=(1+Math.sign(e.deltaY)*0.08); radius=Math.max(2.8,Math.min(11,radius)); updateCamera();},{passive:false});

  function resize(){const w=innerWidth,h=innerHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();}
  addEventListener('resize',resize); resize();

  function loop(){renderer.render(scene,camera);requestAnimationFrame(loop);}
  buildSolid('cylinder'); updateCamera(); update(); loop();
})();
</script>
</body>
</html>
